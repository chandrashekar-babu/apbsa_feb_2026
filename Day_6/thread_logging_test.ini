[loggers]
keys=root,thread_logging_with_config

[handlers]
keys=consoleHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler,fileHandler


[logger_thread_logging_with_config]
level=DEBUG
handlers=consoleHandler,fileHandler
qualname=thread_logging_with_config
propagate=0

[handler_fileHandler]
class=FileHandler
level=DEBUG
formatter=detailedFormatter
args=("thread_app.log",)


[handler_consoleHandler]
class=StreamHandler
level=DEBUG
formatter=simpleFormatter
args=(sys.stdout,)

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s

[formatter_detailedFormatter]
format=%(asctime)s: %(processName)s: %(threadName)s: %(funcName)s: %(levelname)s - %(message)s